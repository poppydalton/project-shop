<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlushBasket | Login</title>
    <link rel="stylesheet" href="../styles/blushbasket-styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg blush-navbar sticky-top">
        <div class="container blush-nav-shell">
            <a class="navbar-brand blush-brand" href="../index.html">BlushBasket</a>
            <div class="d-flex align-items-center gap-2 ms-auto">
                <a href="../index.html" class="btn blush-secondary-action">Home</a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <section class="blush-login-card shadow-sm">
            <h1 class="blush-login-title">Login</h1>

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input id="username" type="text" class="form-control form-control-lg blush-form-input"
                    placeholder="Enter username">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <input id="password" type="password" class="form-control form-control-lg blush-form-input"
                        placeholder="Enter password">
                    <button class="btn btn-light border" type="button" id="togglePassword"
                        aria-label="Toggle password visibility">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="d-grid gap-3 mt-4">
                <button id="login-button" class="btn blush-primary-action btn-lg" type="button">Sign In</button>
                <a href="../index.html" class="btn blush-secondary-action">Back to Home</a>
            </div>

            <p id="loginMessage" class="mt-3 small text-danger"></p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/login-script.js"></script>
</body>

</html>
